subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            if (project.android.namespace == null) {
                project.android.namespace = project.group.toString()
            }
            try {
                project.android.compileOptions {
                    sourceCompatibility = org.gradle.api.JavaVersion.VERSION_17
                    targetCompatibility = org.gradle.api.JavaVersion.VERSION_17
                }
            } catch (Exception e) {}
        }
    }
    
    // Fix JVM Toolchain inconsistency for older plugins
    try {
        project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile.class).configureEach { task ->
            task.kotlinOptions.jvmTarget = "17"
        }
    } catch (Exception e) {}
}
